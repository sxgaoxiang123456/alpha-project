<!-- knife6_viewer.html — self-contained, human-first journey viewer.
     Reads a path-inventory.json (drag-drop, file picker, or ?src=URL).

     MAIN VIEW = a list of JOURNEY CARDS, not a code hairball. Each card shows:
        - a P-level badge + one-sentence plain-language `summary`
        - the `ordered_steps` rendered as a left-to-right step flow
          (① label → ② label → …), each chip colored by status
          (candidate = dashed grey / code-confirmed = blue / trace-confirmed = green)
        - which features the chain crosses, as colored feature tags (lanes)
        - a click on a step opens its provenance + technical node detail
        - a collapsible "查看技术细节" panel per card lists the raw edges
          (engineers only — hidden by default; NO scatter graph on screen).

     v2 visual pass — "mission-control / observability" command center skin.
     Pure DOM + CSS, no chart library, no external requests: animations are CSS only.
     Status colors (grey candidate / blue code / green trace) are LOAD-BEARING
     semantics (evidence-confidence), NOT market up/down colors — do not repurpose. -->
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>用户旅程清单 · path-inventory viewer</title>
<style>
  :root {
    /* ground — deep tinted near-black, cool navy, never pure #000 */
    --bg-0:#070a0f; --bg-1:#0b1018; --bg-2:#0e141d;
    --panel:#10161f; --panel-hi:#141c27;
    --ink:#eaf1f9; --ink-dim:#b6c2d2; --muted:#76859a; --faint:#4a5667;
    --line:#202a37; --line-hi:#2c3a4c;

    /* evidence-confidence semantics (NOT up/down colors) */
    --cand:#8492a6;  --cand-glow:rgba(132,146,166,.0);
    --code:#3d8bff;  --code-glow:rgba(61,139,255,.55);
    --trace:#27d796; --trace-glow:rgba(39,215,150,.5);

    /* priority */
    --p0:#ff5d6c; --p0-glow:rgba(255,93,108,.55);
    --p1:#f5b53d; --p2:#3d8bff; --p3:#56627a;

    --accent:#5ad0ff;   /* cool cyan, used sparingly for hero/affordances */
    --radius:14px;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,"JetBrains Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
  }
  * { box-sizing:border-box; }
  html,body { height:100%; }
  body {
    margin:0; font-family:var(--sans); color:var(--ink);
    background:var(--bg-0);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    overflow-x:hidden;
  }
  /* ── ambient backdrop: faint engineering grid + slow aurora drift ── */
  .bg-fx { position:fixed; inset:0; z-index:-1; overflow:hidden; pointer-events:none; }
  .bg-grid {
    position:absolute; inset:-2px;
    background-image:
      linear-gradient(rgba(60,90,130,.055) 1px, transparent 1px),
      linear-gradient(90deg, rgba(60,90,130,.055) 1px, transparent 1px);
    background-size:46px 46px;
    mask-image:radial-gradient(ellipse 120% 90% at 50% -10%, #000 35%, transparent 80%);
    -webkit-mask-image:radial-gradient(ellipse 120% 90% at 50% -10%, #000 35%, transparent 80%);
  }
  .bg-aurora {
    position:absolute; width:120vw; height:120vh; left:-10vw; top:-30vh;
    background:
      radial-gradient(38vw 38vw at 22% 18%, rgba(61,139,255,.14), transparent 60%),
      radial-gradient(34vw 34vw at 82% 26%, rgba(39,215,150,.10), transparent 60%),
      radial-gradient(40vw 40vw at 60% 80%, rgba(90,208,255,.07), transparent 62%);
    filter:blur(8px); animation:drift 34s ease-in-out infinite alternate;
  }
  @keyframes drift { from{ transform:translate3d(-2%, -1%,0) scale(1); }
                     to  { transform:translate3d(3%, 2%,0)   scale(1.08); } }

  /* ── HERO ─────────────────────────────────────────────── */
  header {
    position:sticky; top:0; z-index:30;
    backdrop-filter:saturate(140%) blur(14px); -webkit-backdrop-filter:saturate(140%) blur(14px);
    background:linear-gradient(180deg, rgba(10,14,20,.92), rgba(10,14,20,.74));
    border-bottom:1px solid var(--line);
  }
  .hero-wrap { max-width:1240px; margin:0 auto; padding:18px 26px 14px; }
  .hero-row { display:flex; align-items:flex-start; justify-content:space-between; gap:18px; flex-wrap:wrap; }
  .titleblock { min-width:280px; }
  .eyebrow {
    display:inline-flex; align-items:center; gap:7px; font-family:var(--mono);
    font-size:10.5px; letter-spacing:.22em; text-transform:uppercase; color:var(--accent);
    margin:0 0 7px;
  }
  .eyebrow .live { width:7px; height:7px; border-radius:50%; background:var(--trace);
    box-shadow:0 0 0 0 var(--trace-glow); animation:pulse 2.4s ease-out infinite; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 var(--trace-glow);} 70%{box-shadow:0 0 0 7px rgba(39,215,150,0);} 100%{box-shadow:0 0 0 0 rgba(39,215,150,0);} }
  h1 { margin:0; font-size:clamp(20px,2.6vw,30px); font-weight:760; letter-spacing:-.01em; line-height:1.08; }
  h1 .sub { display:block; font-size:12.5px; font-weight:450; color:var(--muted); letter-spacing:0; margin-top:6px; }

  .toolbar { display:flex; flex-direction:column; align-items:flex-end; gap:10px; }
  .drop {
    display:inline-flex; align-items:center; gap:8px; cursor:pointer;
    border:1px dashed var(--line-hi); border-radius:10px; padding:9px 15px;
    color:var(--ink-dim); font-size:12px; background:rgba(20,28,39,.5);
    transition:border-color .16s, color .16s, background .16s; white-space:nowrap;
  }
  .drop:hover { border-color:var(--accent); color:var(--ink); background:rgba(20,28,39,.85); }
  .drop svg { width:15px; height:15px; opacity:.8; }
  .legend { display:flex; flex-wrap:wrap; gap:14px; font-size:11.5px; color:var(--muted); }
  .legend .k { display:inline-flex; align-items:center; gap:7px; }
  .dot { width:13px; height:13px; border-radius:4px; display:inline-block; }
  .dot.cand { background:transparent; border:1.5px dashed var(--cand); }
  .dot.code { background:var(--code); box-shadow:0 0 9px var(--code-glow); }
  .dot.trace{ background:var(--trace); box-shadow:0 0 9px var(--trace-glow); }

  /* ── STAT TILES ───────────────────────────────────────── */
  .tiles { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-top:18px; }
  .tile {
    position:relative; overflow:hidden; border-radius:12px; padding:13px 15px 12px;
    background:linear-gradient(160deg, var(--panel-hi), var(--panel));
    border:1px solid var(--line); isolation:isolate;
  }
  .tile::before { /* top hairline accent */
    content:""; position:absolute; left:0; top:0; height:2px; width:100%;
    background:var(--tile-c, var(--accent)); opacity:.85;
    box-shadow:0 0 14px var(--tile-g, transparent);
  }
  .tile .lab { font-family:var(--mono); font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); }
  .tile .val { font-size:30px; font-weight:740; line-height:1; margin-top:7px; letter-spacing:-.02em; font-variant-numeric:tabular-nums; }
  .tile .val .unit { font-size:12px; font-weight:500; color:var(--muted); margin-left:4px; }
  .tile.is-p0 .val { color:var(--p0); }
  .tile.is-cand .val { color:var(--cand); }
  .tile.is-code .val { color:var(--code); }
  .tile.is-trace .val { color:var(--trace); }
  .tile .spark { margin-top:9px; height:5px; border-radius:3px; background:var(--bg-2); overflow:hidden; }
  .tile .spark > i { display:block; height:100%; border-radius:3px; background:var(--tile-c,var(--accent)); }

  /* ── MAIN ─────────────────────────────────────────────── */
  main { max-width:1240px; margin:0 auto; padding:26px 26px 120px; }
  .section-head { display:flex; align-items:baseline; gap:12px; margin:6px 0 18px; }
  .section-head h2 { font-size:13px; font-weight:680; letter-spacing:.02em; margin:0; color:var(--ink-dim); }
  .section-head .rule { flex:1; height:1px; background:linear-gradient(90deg,var(--line),transparent); }

  .card {
    position:relative; border-radius:var(--radius); padding:20px 22px;
    margin-bottom:18px; background:linear-gradient(165deg, rgba(20,28,39,.66), rgba(14,20,29,.62));
    border:1px solid var(--line);
    box-shadow:0 1px 0 rgba(255,255,255,.02) inset, 0 18px 40px -28px rgba(0,0,0,.9);
    transition:transform .22s cubic-bezier(.2,.7,.2,1), border-color .22s, box-shadow .22s;
    animation:rise .5s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes rise { from{ opacity:0; transform:translateY(14px); } to{ opacity:1; transform:none; } }
  .card:hover { transform:translateY(-3px); border-color:var(--line-hi);
                box-shadow:0 1px 0 rgba(255,255,255,.03) inset, 0 26px 54px -26px rgba(0,0,0,.95); }
  /* P0 emphasis: gradient ring + soft glow */
  .card.is-p0 { border-color:transparent; }
  .card.is-p0::before {
    content:""; position:absolute; inset:0; border-radius:var(--radius); padding:1px;
    background:linear-gradient(135deg, var(--p0), rgba(255,93,108,.15) 45%, var(--accent));
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
    -webkit-mask-composite:xor; mask-composite:exclude; pointer-events:none;
  }
  .card.is-p0 { box-shadow:0 0 0 1px rgba(255,93,108,.06), 0 24px 60px -30px rgba(255,93,108,.35); }
  .card.is-p0:hover { box-shadow:0 0 0 1px rgba(255,93,108,.12), 0 30px 66px -26px rgba(255,93,108,.45); }

  .card-top { display:flex; align-items:flex-start; gap:12px; }
  .badge {
    flex:0 0 auto; font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.06em;
    padding:4px 10px; border-radius:8px; line-height:1;
  }
  .badge.P0 { color:#fff; background:linear-gradient(135deg,#ff5d6c,#d8344a); box-shadow:0 0 16px var(--p0-glow); }
  .badge.P1 { color:#1a1206; background:linear-gradient(135deg,#ffd166,#f5b53d); }
  .badge.P2 { color:#fff; background:linear-gradient(135deg,#5aa2ff,#2f6fe0); }
  .badge.P3 { color:#cfd7e3; background:#2a3344; }
  .summary { font-size:15px; line-height:1.55; font-weight:520; color:var(--ink); }
  .summary .jid { font-family:var(--mono); font-size:11.5px; color:var(--accent);
                  background:rgba(90,208,255,.08); border:1px solid rgba(90,208,255,.16);
                  padding:2px 7px; border-radius:6px; margin-right:9px; vertical-align:1px; }

  .feat-lanes { margin:14px 0 2px; display:flex; flex-wrap:wrap; gap:7px; align-items:center; }
  .feat-lanes .ll { font-family:var(--mono); font-size:9.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--faint); margin-right:2px; }
  .feat-tag {
    font-size:11px; font-weight:560; padding:3px 10px 3px 9px; border-radius:999px;
    color:var(--ink); white-space:nowrap; display:inline-flex; align-items:center; gap:6px;
    background:color-mix(in oklab, var(--fc) 16%, transparent);
    border:1px solid color-mix(in oklab, var(--fc) 50%, transparent);
  }
  .feat-tag::before { content:""; width:7px; height:7px; border-radius:50%; background:var(--fc);
                      box-shadow:0 0 8px color-mix(in oklab, var(--fc) 70%, transparent); }

  /* ── STEP FLOW ────────────────────────────────────────── */
  .flow { display:flex; flex-wrap:wrap; align-items:stretch; gap:0; margin:16px 0 2px; }
  .step {
    position:relative; display:flex; flex-direction:column; gap:5px;
    min-width:138px; max-width:240px; flex:1 1 138px;
    border-radius:11px; padding:11px 13px; cursor:pointer;
    background:linear-gradient(165deg, rgba(15,21,30,.92), rgba(11,16,23,.92));
    border:1px solid var(--line); isolation:isolate;
    transition:transform .16s, border-color .16s, box-shadow .16s;
  }
  .step:hover { transform:translateY(-3px); }
  .step::after { /* left status rail */
    content:""; position:absolute; left:0; top:9px; bottom:9px; width:3px; border-radius:3px;
    background:var(--sc); box-shadow:0 0 10px var(--sg);
  }
  .step.cand  { border-style:dashed; border-color:color-mix(in oklab,var(--cand) 55%, var(--line));
                --sc:var(--cand); --sg:transparent; }
  .step.code  { border-color:color-mix(in oklab,var(--code) 55%, var(--line)); --sc:var(--code); --sg:var(--code-glow); }
  .step.trace { border-color:color-mix(in oklab,var(--trace) 60%, var(--line)); --sc:var(--trace); --sg:var(--trace-glow); }
  .step.code:hover  { box-shadow:0 0 0 1px color-mix(in oklab,var(--code) 50%,transparent), 0 14px 26px -16px var(--code-glow); }
  .step.trace:hover { box-shadow:0 0 0 1px color-mix(in oklab,var(--trace) 50%,transparent),0 14px 26px -16px var(--trace-glow); }
  .step.cand:hover  { box-shadow:0 14px 26px -18px rgba(0,0,0,.8); }
  .step .num {
    display:inline-flex; align-items:center; justify-content:center;
    width:20px; height:20px; border-radius:6px; font-family:var(--mono); font-size:11px; font-weight:700;
    color:var(--sc); background:color-mix(in oklab,var(--sc) 14%, transparent);
    border:1px solid color-mix(in oklab,var(--sc) 40%, transparent);
  }
  .step .hd { display:flex; align-items:center; gap:7px; }
  .step .ico { font-size:13px; line-height:1; filter:saturate(.85); }
  .step .lbl { font-size:13px; line-height:1.34; font-weight:520; color:var(--ink); }
  .step .hop { font-family:var(--mono); font-size:9.5px; letter-spacing:.04em; color:var(--muted);
               display:flex; align-items:center; gap:5px; margin-top:1px; }
  .step .hop .st-dot { width:6px; height:6px; border-radius:50%; background:var(--sc); box-shadow:0 0 6px var(--sg); }

  /* animated flowing connector between steps */
  .arrow { position:relative; align-self:center; flex:0 0 30px; height:2px; margin:0 4px; }
  .arrow i { position:absolute; inset:0; border-radius:2px;
    background:linear-gradient(90deg, transparent, color-mix(in oklab,var(--ac) 70%, transparent), transparent);
    background-size:200% 100%; animation:flowpulse 1.8s linear infinite; }
  .arrow::after { content:""; position:absolute; right:-1px; top:50%; transform:translateY(-50%);
    border-left:5px solid var(--ac); border-top:4px solid transparent; border-bottom:4px solid transparent; opacity:.85; }
  @keyframes flowpulse { 0%{ background-position:120% 0; } 100%{ background-position:-120% 0; } }

  .p-reason { font-size:11.5px; line-height:1.5; color:var(--muted); margin-top:12px;
    border-left:2px solid var(--line-hi); padding-left:11px; font-family:var(--mono); }
  .p-reason b { color:var(--p0); font-weight:700; }
  .acs { margin-top:8px; display:flex; flex-wrap:wrap; gap:5px; }
  .ac-chip { font-family:var(--mono); font-size:9.5px; letter-spacing:.04em; color:var(--ink-dim);
    background:rgba(255,255,255,.03); border:1px solid var(--line); border-radius:5px; padding:2px 7px; }

  /* ── tech detail (engineers only, collapsed) ──────────── */
  .toggle { margin-top:14px; }
  .toggle > summary {
    cursor:pointer; list-style:none; display:inline-flex; align-items:center; gap:7px;
    font-family:var(--mono); font-size:11px; letter-spacing:.04em; color:var(--muted);
    padding:5px 10px; border:1px solid var(--line); border-radius:8px;
    transition:color .15s, border-color .15s; user-select:none;
  }
  .toggle > summary:hover { color:var(--ink-dim); border-color:var(--line-hi); }
  .toggle > summary::-webkit-details-marker { display:none; }
  .toggle .chev { transition:transform .2s; font-size:9px; }
  .toggle[open] .chev { transform:rotate(90deg); }
  /* smooth grid-rows expand (no height-jank) */
  .tech-wrap { display:grid; grid-template-rows:0fr; transition:grid-template-rows .28s cubic-bezier(.2,.7,.2,1); }
  .toggle[open] .tech-wrap { grid-template-rows:1fr; }
  .tech { overflow:hidden; }
  .tech-inner { margin-top:10px; border:1px solid var(--line); border-radius:9px; overflow:hidden; }
  table { width:100%; border-collapse:collapse; font-size:11.5px; }
  td, th { padding:7px 10px; border-bottom:1px solid var(--line); text-align:left; vertical-align:top; word-break:break-word; }
  th { font-family:var(--mono); font-size:9.5px; letter-spacing:.08em; text-transform:uppercase;
       color:var(--muted); font-weight:600; background:var(--bg-2); }
  tr:last-child td { border-bottom:none; }
  td.mono, .prov { font-family:var(--mono); font-size:10.5px; color:var(--ink-dim); }
  .edge-type { font-family:var(--mono); color:var(--muted); white-space:nowrap; }
  .st-pill { font-family:var(--mono); font-size:9.5px; padding:2px 7px; border-radius:6px; white-space:nowrap; }
  .st-candidate { color:var(--cand); border:1px dashed var(--cand); }
  .st-code-confirmed { background:var(--code); color:#fff; }
  .st-trace-confirmed { background:var(--trace); color:#05130d; }

  /* ── side drawer ──────────────────────────────────────── */
  #scrim { position:fixed; inset:0; background:rgba(4,7,11,.55); backdrop-filter:blur(2px);
           opacity:0; pointer-events:none; transition:opacity .2s; z-index:40; }
  #scrim.open { opacity:1; pointer-events:auto; }
  #drawer { position:fixed; right:0; top:0; height:100%; width:min(460px,94vw); overflow:auto;
            background:linear-gradient(180deg,var(--panel-hi),var(--panel));
            border-left:1px solid var(--line-hi); box-shadow:-30px 0 80px -40px rgba(0,0,0,.9);
            transform:translateX(105%); transition:transform .26s cubic-bezier(.2,.7,.2,1);
            z-index:50; padding:22px 22px 30px; }
  #drawer.open { transform:translateX(0); }
  #drawer .dhead { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
  #drawer h3 { margin:0; font-size:15px; font-weight:680; line-height:1.3; }
  #drawer .x { cursor:pointer; color:var(--muted); border:1px solid var(--line); border-radius:8px;
               padding:4px 9px; font-size:12px; transition:color .15s, border-color .15s; }
  #drawer .x:hover { color:var(--ink); border-color:var(--line-hi); }
  .kv { margin-top:16px; }
  .kv .row { display:grid; grid-template-columns:92px 1fr; gap:10px; padding:8px 0; border-bottom:1px solid var(--line); }
  .kv .row:last-child { border-bottom:none; }
  .kv .key { font-family:var(--mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); padding-top:2px; }
  .kv .v { font-size:12.5px; line-height:1.5; color:var(--ink); word-break:break-word; }
  .kv .v.mono { font-family:var(--mono); font-size:11px; color:var(--ink-dim); }
  .drawer-note { margin-top:18px; font-size:11px; line-height:1.6; color:var(--muted);
    background:var(--bg-1); border:1px solid var(--line); border-radius:9px; padding:11px 13px; }

  /* ── empty / status states ────────────────────────────── */
  .empty { color:var(--muted); font-size:13.5px; line-height:1.7; padding:64px 24px; text-align:center;
           border:1px dashed var(--line); border-radius:14px; background:rgba(14,20,29,.4); }
  .empty code { font-family:var(--mono); color:var(--accent); background:rgba(90,208,255,.08);
                padding:2px 7px; border-radius:5px; }
  .empty .big { font-size:34px; opacity:.4; display:block; margin-bottom:12px; }
  a { color:var(--accent); }

  @media (prefers-reduced-motion:reduce){ *{ animation:none!important; transition:none!important; } }
  @media (max-width:680px){
    .hero-row{ flex-direction:column; } .toolbar{ align-items:flex-start; }
    main,.hero-wrap{ padding-left:16px; padding-right:16px; }
  }
</style>
</head>
<body>
<div class="bg-fx"><div class="bg-aurora"></div><div class="bg-grid"></div></div>

<header>
 <div class="hero-wrap">
  <div class="hero-row">
   <div class="titleblock">
     <div class="eyebrow"><span class="live"></span>PATH-INVENTORY · 跨 FEATURE 链路指挥台</div>
     <h1>用户旅程清单
       <span class="sub">系统里有哪些跨 feature 用户旅程 — 给人看的视图，不是代码散点图</span></h1>
   </div>
   <div class="toolbar">
     <label class="drop" id="drop">
       <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 16V4m0 0L8 8m4-4 4 4"/><path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
       拖入 / 选择 path-inventory.json
       <input id="file" type="file" accept=".json" hidden></label>
     <div class="legend">
       <span class="k"><i class="dot cand"></i>候选 (spec 推导)</span>
       <span class="k"><i class="dot code"></i>代码确认</span>
       <span class="k"><i class="dot trace"></i>运行时确认</span>
     </div>
   </div>
  </div>
  <div class="tiles" id="tiles"></div>
 </div>
</header>

<main>
  <div class="section-head"><h2 id="sec-title">用户旅程</h2><span class="rule"></span></div>
  <div id="cards">
    <div class="empty"><span class="big">⌖</span>
      把 <code>out/demo-path-inventory.json</code> 拖进来，<br>或用 <code>?src=out/demo-path-inventory.json</code> 自动加载。</div>
  </div>
</main>

<div id="scrim" onclick="closeDrawer()"></div>
<div id="drawer">
  <div class="dhead"><h3 id="dtitle"></h3><span class="x" onclick="closeDrawer()">关闭 ✕</span></div>
  <div class="kv" id="dbody"></div>
  <div class="drawer-note">证据状态是<b>坐实程度</b>（candidate=spec 推导 / code=代码确认 / trace=运行时确认），
    与涨跌色无关。provenance 为该步骤的来源凭证，未经核实的内容不会被编造。</div>
</div>

<script>
const STATUS_CLASS = { "candidate":"cand", "code-confirmed":"code", "trace-confirmed":"trace" };
// hop-type → small icon (emoji, keeps it dependency-free)
const HOP_ICON = {
  "ui":"🖱️", "http":"🌐", "call":"⚙️", "cron":"⏰", "step":"▸",
  "async":"📡", "cross-channel":"📣", "shared-key":"🗄️", "queue":"📥", "db":"🗄️"
};
// stable, distinct palette for feature lanes
const FEAT_COLORS = ["#3d8bff","#27d796","#f5b53d","#a371f7","#ff5d6c","#5ad0ff","#ff8fb1","#e3b341","#7ee787","#79c0ff"];
let DATA = null, NODE_MAP = {}, EDGE_MAP = {}, FEAT_COLOR = {};

function featColor(f){
  if(!(f in FEAT_COLOR)){
    FEAT_COLOR[f] = FEAT_COLORS[Object.keys(FEAT_COLOR).length % FEAT_COLORS.length];
  }
  return FEAT_COLOR[f];
}
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function hopIcon(h){ return HOP_ICON[h] || "•"; }
function statusVar(st){ return st==="trace-confirmed" ? "var(--trace)" : st==="code-confirmed" ? "var(--code)" : "var(--cand)"; }

function render(data){
  DATA = data;
  NODE_MAP = {}; (data.nodes||[]).forEach(n => NODE_MAP[n.id]=n);
  EDGE_MAP = {}; (data.edges||[]).forEach(e => EDGE_MAP[e.id]=e);
  FEAT_COLOR = {};

  const c = (data._meta && data._meta.counts) || {};
  const journeys = data.journeys || [];
  const edges = data.edges || [];
  const total = edges.length || 1;
  const cand = c.candidate ?? 0, code = c.code_confirmed ?? 0, trace = c.trace_confirmed ?? 0;

  // ── stat tiles ──
  renderTiles([
    { lab:"用户旅程", val:journeys.length, unit:"条", c:"var(--accent)", g:"rgba(90,208,255,.5)", pct:100 },
    { lab:"P0 关键旅程", val:(c.P0 ?? journeys.filter(j=>j.p_level==="P0").length), unit:"条", cls:"is-p0",
      c:"var(--p0)", g:"var(--p0-glow)", pct: journeys.length? Math.round((c.P0??0)/journeys.length*100):0 },
    { lab:"候选边 (spec)", val:cand, unit:"", cls:"is-cand", c:"var(--cand)", g:"transparent", pct:Math.round(cand/total*100) },
    { lab:"代码确认边", val:code, unit:"", cls:"is-code", c:"var(--code)", g:"var(--code-glow)", pct:Math.round(code/total*100) },
    { lab:"运行时确认边", val:trace, unit:"", cls:"is-trace", c:"var(--trace)", g:"var(--trace-glow)", pct:Math.round(trace/total*100) },
  ]);

  document.getElementById("sec-title").textContent =
    journeys.length ? `用户旅程 · ${journeys.length} 条` : "用户旅程";

  const root = document.getElementById("cards");
  root.innerHTML = "";
  if(!journeys.length){ root.innerHTML = '<div class="empty"><span class="big">⌀</span>这份清单没有跨 feature 旅程。</div>'; return; }
  // P0 first, then by id, so the most important journeys lead the feed
  const order = {P0:0,P1:1,P2:2,P3:3};
  journeys.slice().sort((a,b)=>(order[a.p_level]??9)-(order[b.p_level]??9))
          .forEach((j,i) => { const el=journeyCard(j); el.style.animationDelay=(i*55)+"ms"; root.appendChild(el); });
}

function renderTiles(items){
  const t = document.getElementById("tiles");
  t.innerHTML = items.map(it => `
    <div class="tile ${it.cls||""}" style="--tile-c:${it.c};--tile-g:${it.g}">
      <div class="lab">${esc(it.lab)}</div>
      <div class="val">${it.val}${it.unit?`<span class="unit">${esc(it.unit)}</span>`:""}</div>
      <div class="spark"><i style="width:${Math.max(4,Math.min(100,it.pct||0))}%"></i></div>
    </div>`).join("");
}

function journeyCard(j){
  const card = document.createElement("div");
  const p = j.p_level || "P3";
  card.className = "card" + (p==="P0" ? " is-p0" : "");
  const featsNamed = j.crosses_features_named || j.crosses_features || [];

  // top: badge + summary
  const top = document.createElement("div"); top.className = "card-top";
  const badge = document.createElement("span"); badge.className = "badge "+p; badge.textContent = p;
  const summ = document.createElement("div"); summ.className = "summary";
  const summaryText = j.summary || ("[" + p + "] " + (j.name||j.id));
  summ.innerHTML = `<span class="jid">${esc(j.id)}</span>${esc(stripHead(summaryText))}`;
  top.appendChild(badge); top.appendChild(summ);
  card.appendChild(top);

  // feature lanes
  const lanes = document.createElement("div"); lanes.className = "feat-lanes";
  const ll = document.createElement("span"); ll.className="ll"; ll.textContent="穿过"; lanes.appendChild(ll);
  (j.crosses_features||[]).forEach((f,i) => {
    const tag = document.createElement("span"); tag.className = "feat-tag";
    tag.style.setProperty("--fc", featColor(f));
    tag.textContent = featsNamed[i] || f;
    lanes.appendChild(tag);
  });
  card.appendChild(lanes);

  // step flow
  const steps = j.ordered_steps || [];
  const flow = document.createElement("div"); flow.className = "flow";
  if(steps.length){
    steps.forEach((s, idx) => {
      if(idx>0){
        const a=document.createElement("span"); a.className="arrow";
        a.style.setProperty("--ac", statusVar(s.status)); // connector tinted by the step it leads into
        a.innerHTML="<i></i>"; flow.appendChild(a);
      }
      flow.appendChild(stepChip(s, idx+1, j));
    });
  } else {
    const none = document.createElement("div"); none.style.cssText="color:var(--muted);font-size:12px;";
    none.textContent = "（无可读步骤：仅含被过滤的内部/三方依赖）";
    flow.appendChild(none);
  }
  card.appendChild(flow);

  // acs
  if((j.acs||[]).length){
    const acs = document.createElement("div"); acs.className="acs";
    j.acs.forEach(a => { const c=document.createElement("span"); c.className="ac-chip"; c.textContent=a; acs.appendChild(c); });
    card.appendChild(acs);
  }

  // p_reason
  if(j.p_reason){
    const pr = document.createElement("div"); pr.className="p-reason";
    pr.innerHTML = esc(j.p_reason).replace(/^(P\d)/, "<b>$1</b>");
    card.appendChild(pr);
  }

  card.appendChild(techToggle(j));
  return card;
}

// strip the "[P0] 跨 N 个 feature（…）：" head that summary already encodes
function stripHead(text){ const idx = text.indexOf("："); return idx>=0 ? text.slice(idx+1) : text; }

function stepChip(s, num, j){
  const cls = STATUS_CLASS[s.status] || "cand";
  const el = document.createElement("div"); el.className = "step "+cls;
  el.innerHTML =
    `<div class="hd"><span class="num">${num}</span>`+
    `<span class="ico" title="${esc(s.hop_type||"")}">${hopIcon(s.hop_type)}</span></div>`+
    `<span class="lbl">${esc(s.label||"(未命名步骤)")}</span>`+
    `<span class="hop"><span class="st-dot"></span>${esc(s.hop_type||"-")} · ${esc(s.status||"-")}</span>`;
  el.onclick = () => openStep(s, num, j);
  return el;
}

function techToggle(j){
  const det = document.createElement("details"); det.className = "toggle";
  const sum = document.createElement("summary");
  sum.innerHTML = `<span class="chev">▸</span>查看技术细节（原始边 / 节点 / provenance）`;
  det.appendChild(sum);
  const outer = document.createElement("div"); outer.className = "tech-wrap";
  const tech = document.createElement("div"); tech.className = "tech";
  const inner = document.createElement("div"); inner.className = "tech-inner";
  const rows = (j.edge_ids||[]).map(id => {
    const e = EDGE_MAP[id]; if(!e) return "";
    const loc = provStr(e.provenance);
    return `<tr><td class="mono">${esc(e.from)}</td><td class="edge-type">—${esc(e.type)}→</td><td class="mono">${esc(e.to)}</td>`+
           `<td><span class="st-pill st-${esc(e.status)}">${esc(e.status)}</span></td>`+
           `<td class="prov">${esc(loc)}</td></tr>`;
  }).join("");
  inner.innerHTML = `<table><thead><tr><th>from</th><th>type</th><th>to</th><th>status</th><th>provenance</th></tr></thead>`+
                    `<tbody>${rows||'<tr><td colspan=5>（无边）</td></tr>'}</tbody></table>`;
  tech.appendChild(inner); outer.appendChild(tech); det.appendChild(outer);
  return det;
}

function provStr(p){
  if(!p) return "";
  if(typeof p === "string") return p;
  if(p.file && p.line!=null) return `${p.file}:${p.line}`;
  if(p.span) return `span ${p.span}`;
  if(p.event) return `event ${JSON.stringify(p.event)}`;
  return JSON.stringify(p);
}

function openStep(s, num, j){
  const node = NODE_MAP[s.node] || {};
  document.getElementById("dtitle").innerHTML =
    `<span class="step ${STATUS_CLASS[s.status]||'cand'}" style="display:inline-flex;padding:2px 8px;margin-right:8px;vertical-align:2px;min-width:0">`+
    `<span style="font-family:var(--mono);font-size:11px;color:${statusVar(s.status)}">${num}</span></span>`+
    esc(s.label||"(未命名步骤)");
  const rows = [
    ["hop 类型", esc(hopIcon(s.hop_type)+" "+(s.hop_type||"-")), false],
    ["证据状态", `<span class="st-pill st-${esc(s.status)}">${esc(s.status||"-")}</span>`, true],
    ["所在旅程", `${esc(j.id)} · <b>${esc(j.p_level||"-")}</b>`, false],
    ["provenance", esc(s.provenance||"-"), true],
    ["node id", esc(s.node||"-"), true],
    ["node kind", esc(s.node_kind||node.kind||"-"), true],
    ["feature", esc(node.feature||"-"), true],
    ["node prov", esc(provStr(node.provenance)||"-"), true],
  ];
  document.getElementById("dbody").innerHTML = rows.map(([k,v,m]) =>
    `<div class="row"><div class="key">${k}</div><div class="v ${m?'mono':''}">${v}</div></div>`).join("");
  document.getElementById("drawer").classList.add("open");
  document.getElementById("scrim").classList.add("open");
}
function closeDrawer(){ document.getElementById("drawer").classList.remove("open");
                        document.getElementById("scrim").classList.remove("open"); }
document.addEventListener("keydown", e => { if(e.key==="Escape") closeDrawer(); });

// loaders
function load(json){ try { render(typeof json==="string"?JSON.parse(json):json); }
  catch(e){ document.getElementById("cards").innerHTML =
    '<div class="empty"><span class="big">⚠</span>解析失败: '+esc(e.message||e)+'</div>'; } }
document.getElementById("file").addEventListener("change", ev => {
  const f = ev.target.files[0]; if(!f) return;
  const r = new FileReader(); r.onload = () => load(r.result); r.readAsText(f);
});
const drop = document.getElementById("drop");
["dragover","dragenter"].forEach(t => drop.addEventListener(t, e => { e.preventDefault(); drop.style.borderColor="var(--accent)"; }));
["dragleave","drop"].forEach(t => drop.addEventListener(t, e => { e.preventDefault(); drop.style.borderColor=""; }));
drop.addEventListener("drop", e => { const f=e.dataTransfer.files[0]; if(f){ const r=new FileReader(); r.onload=()=>load(r.result); r.readAsText(f);} });

// auto-load via ?src=
const src = new URLSearchParams(location.search).get("src");
if(src){ fetch(src).then(r=>r.text()).then(load).catch(e=>{
  document.getElementById("cards").innerHTML='<div class="empty"><span class="big">⚠</span>fetch 失败: '+esc(e.message||e)+'</div>'; }); }
</script>
</body>
</html>
