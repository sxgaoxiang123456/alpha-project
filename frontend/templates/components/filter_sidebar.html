<div class="col-span-12 md:col-span-3 lg:col-span-2">
    <div class="bg-surface-base border border-outline-variant rounded flex flex-col p-2 gap-1 sticky top-0">
        <button class="flex items-center justify-between w-full text-left px-3 py-2 rounded bg-surface-container-high text-primary-fixed font-headline-md text-headline-md border border-primary-container/30">
            <span>全部资产</span>
            <span class="font-data-table text-data-table text-on-surface-variant">{{ items|length }}</span>
        </button>
        {% for group in groups %}
        {% if not group.is_default %}
        <button class="flex items-center justify-between w-full text-left px-3 py-2 rounded text-on-surface-variant hover:bg-surface-variant transition-colors">
            <span class="font-body-md text-body-md">{{ group.name }}</span>
            <span class="font-data-table text-data-table">{{ group_counts.get(group.id, 0) }}</span>
        </button>
        {% endif %}
        {% endfor %}
        <div class="my-2 border-t border-outline-variant/50"></div>
        <button class="flex items-center gap-2 w-full text-left px-3 py-2 rounded text-on-surface-variant hover:text-primary transition-colors" onclick="showCreateGroupModal()">
            <span class="material-symbols-outlined text-[18px]">add_circle</span>
            <span class="font-body-md text-body-md">新建分组</span>
        </button>
    </div>
</div>
