<div class="col-span-12 md:col-span-9 lg:col-span-10">
    <div class="bg-surface-base border border-outline-variant rounded overflow-hidden shadow-[0_4px_24px_rgba(0,0,0,0.2)]">
        <!-- Table Header Controls -->
        <div class="flex items-center justify-between px-4 py-3 border-b border-outline-variant bg-surface-dim">
            <div class="flex gap-4">
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-2 top-1/2 -translate-y-1/2 text-on-surface-variant text-[16px]">filter_list</span>
                    <select class="pl-8 pr-8 py-1 bg-surface-raised border border-outline-variant rounded font-body-md text-body-md text-on-surface appearance-none focus:outline-none focus:border-primary-container">
                        <option>排序：添加时间</option>
                        <option>排序：股票代码</option>
                    </select>
                </div>
            </div>
            <span class="font-data-table text-data-table text-on-surface-variant uppercase text-[10px] tracking-wider">共 {{ items|length }} 只</span>
        </div>
        <!-- Data Table -->
        <div class="w-full overflow-x-auto">
            <table class="w-full text-left whitespace-nowrap">
                <thead>
                    <tr class="border-b border-outline-variant bg-surface-container-low font-label-caps text-label-caps text-on-surface-variant">
                        <th class="px-4 py-2 w-10 text-center">
                            <input class="rounded-[0.125rem] border-outline-variant bg-transparent text-primary-container focus:ring-primary-container focus:ring-offset-surface-base" type="checkbox" id="select-all">
                        </th>
                        <th class="px-4 py-2">股票</th>
                        <th class="px-4 py-2">分组</th>
                        <th class="px-4 py-2 text-right">成本价</th>
                        <th class="px-4 py-2 text-right">持股数</th>
                        <th class="px-4 py-2 text-center">操作</th>
                    </tr>
                </thead>
                <tbody class="font-data-table text-data-table">
                    {% for item in items %}
                    <tr class="border-b border-outline-variant/30 hover:bg-surface-variant/50 transition-colors group h-10" data-code="{{ item.stock_code }}">
                        <td class="px-4 py-1 text-center">
                            <input class="rounded-[0.125rem] border-outline-variant bg-transparent text-primary-container focus:ring-primary-container focus:ring-offset-surface-base opacity-0 group-hover:opacity-100 transition-opacity row-checkbox" type="checkbox" value="{{ item.stock_code }}">
                        </td>
                        <td class="px-4 py-1">
                            <div class="flex flex-col">
                                <span class="text-on-surface font-headline-md text-[14px]">{{ item.stock_code }}</span>
                                <span class="text-on-surface-variant text-[11px] font-body-md">{{ item.stock.name if item.stock else '' }}</span>
                            </div>
                        </td>
                        <td class="px-4 py-1">
                            <span class="px-2 py-0.5 bg-secondary-container/30 text-secondary-fixed border border-secondary-container rounded text-[10px] font-label-caps">{{ item.group.name if item.group else '默认分组' }}</span>
                        </td>
                        <td class="px-4 py-1 text-right text-on-surface">{{ item.cost_price or '-' }}</td>
                        <td class="px-4 py-1 text-right text-on-surface">{{ item.shares or '-' }}</td>
                        <td class="px-4 py-1 text-center">
                            <div class="flex items-center justify-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                <button class="text-on-surface-variant hover:text-primary transition-colors" onclick="editStock('{{ item.stock_code }}')">
                                    <span class="material-symbols-outlined text-[16px]">edit</span>
                                </button>
                                <button class="text-on-surface-variant hover:text-market-up transition-colors" onclick="deleteStock('{{ item.stock_code }}')">
                                    <span class="material-symbols-outlined text-[16px]">delete</span>
                                </button>
                            </div>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
