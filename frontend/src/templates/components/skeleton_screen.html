<!-- Dashboard 骨架屏 — 首屏占位，数据到达后由 JS 替换 -->
<div id="skeleton-screen" class="contents">
    <!-- 大盘指数骨架 -->
    <div class="col-span-12 grid grid-cols-3 gap-component-gap">
        {% for _ in range(3) %}
        <div class="bg-surface-raised rounded-lg p-4 animate-pulse">
            <div class="flex items-center justify-between mb-3">
                <div class="h-4 bg-surface-raised/50 rounded w-20"></div>
                <div class="h-3 bg-surface-raised/50 rounded w-12"></div>
            </div>
            <div class="h-8 bg-surface-raised/50 rounded w-32 mb-2"></div>
            <div class="h-4 bg-surface-raised/50 rounded w-24"></div>
        </div>
        {% endfor %}
    </div>

    <!-- 自选股表格骨架 -->
    <div class="col-span-12 lg:col-span-8 flex flex-col gap-component-gap">
        <div class="bg-surface-raised rounded-lg p-4 animate-pulse">
            <div class="h-6 bg-surface-raised/50 rounded w-32 mb-4"></div>
            <div class="space-y-3">
                {% for _ in range(5) %}
                <div class="flex items-center gap-4">
                    <div class="h-4 bg-surface-raised/50 rounded w-16"></div>
                    <div class="h-4 bg-surface-raised/50 rounded w-24 flex-1"></div>
                    <div class="h-4 bg-surface-raised/50 rounded w-20"></div>
                    <div class="h-4 bg-surface-raised/50 rounded w-16"></div>
                    <div class="h-4 bg-surface-raised/50 rounded w-16"></div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>

</div>
