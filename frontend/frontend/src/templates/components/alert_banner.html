{% if alerts %}
<div class="col-span-12 bg-surface-base border border-outline-variant rounded overflow-hidden" x-data="{ open: true }">
    <div class="p-card-padding flex justify-between items-center cursor-pointer" @click="open = !open">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-market-up">notifications_active</span>
            <h2 class="font-headline-md text-headline-md text-on-surface">今日预警</h2>
            <span class="font-label-caps text-label-caps bg-market-up text-on-primary-container px-2 py-0.5 rounded">{{ alerts|length }}</span>
        </div>
        <span class="material-symbols-outlined text-on-surface-variant transition-transform" :class="open ? '' : 'rotate-180'">expand_less</span>
    </div>
    <div x-show="open" class="border-t border-outline-variant">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="border-b border-outline-variant bg-surface-raised/50">
                        <th class="font-label-caps text-label-caps text-on-surface-variant py-2 px-4 font-normal">股票</th>
                        <th class="font-label-caps text-label-caps text-on-surface-variant py-2 px-4 font-normal">触发条件</th>
                        <th class="font-label-caps text-label-caps text-on-surface-variant py-2 px-4 font-normal">级别</th>
                    </tr>
                </thead>
                <tbody>
                    {% for alert in alerts %}
                    <tr class="border-b border-outline-variant/50 hover:bg-surface-variant/30 transition-colors">
                        <td class="font-body-md text-body-md text-on-surface px-4 py-2">{{ alert.stock_name }} ({{ alert.stock_code }})</td>
                        <td class="font-body-md text-body-md text-on-surface-variant px-4 py-2">{{ alert.condition }}</td>
                        <td class="px-4 py-2">
                            {% if alert.level == 'alert' %}
                            <span class="font-label-caps text-label-caps bg-market-up text-on-primary-container px-2 py-0.5 rounded">预警</span>
                            {% else %}
                            <span class="font-label-caps text-label-caps bg-market-warning text-on-primary-container px-2 py-0.5 rounded">关注</span>
                            {% endif %}
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endif %}
