version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: stock-mgt-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 100mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stock-mgt-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:///data/stock_mgt.db
    volumes:
      - backend-data:/data
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
  backend-data:
